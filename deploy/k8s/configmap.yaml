apiVersion: v1
kind: ConfigMap
metadata:
  name: bluecollar-config
data:
  APP_ENV: production
  APP_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
  FRONTEND_URL: "https://app.example.com"
  JWT_ISSUER: bluecollarjob
  JWT_TTL_HOURS: "24"
  NOTIFICATION_WORKER_ENABLED: "true"
  NOTIFICATION_WORKER_COUNT: "2"
  NOTIFICATION_POLL_INTERVAL_SECONDS: "5"
  OBJECT_STORAGE_PROVIDER: linode
  OBJECT_STORAGE_REGION: "ap-south-1"
  OBJECT_STORAGE_ENDPOINT: "https://example.linodeobjects.com"
  OBJECT_STORAGE_BUCKET: "bluecollar-documents"
  DOCUMENT_UPLOAD_ENABLED: "true"
  NEXT_PUBLIC_API_BASE_URL: "https://api.example.com"
  NEXT_PUBLIC_APP_ENV: "production"
